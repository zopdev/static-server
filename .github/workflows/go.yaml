name: static-server

on:
  pull_request:
    branches: [ main,development ]
  push:
    tags:
      - 'v*'

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    name: Test and Build

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.26'
      - name: Get dependencies
        run: go mod download

      - name: Test
        run: |
          go test ./...

  code_quality:
    name: Code Quality🎖️
    runs-on: ubuntu-latest
    container: "golangci/golangci-lint:v2.10.1"
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
      - name: Get dependencies
        run: go get -v -t -d ./...
      - name: GolangCI-Lint
        run: |
          golangci-lint run --timeout 9m0s

  release_package:
    if: ${{ startsWith(github.ref, 'refs/tags/v')}}
    needs: [test_and_build,code_quality]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Validate Docker configuration
        run: |
          if [ -z "${{ vars.DOCKER_USERNAME }}" ]; then
            echo "::error::DOCKER_USERNAME variable is not set"
            exit 1
          fi
          if [ -z "${{ vars.DOCKER_REGISTRY_TARGET }}" ]; then
            echo "::error::DOCKER_REGISTRY_TARGET variable is not set"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "::error::DOCKER_PASSWORD secret is not set"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Get dependencies
        run: |
          go mod download

      - name: Extract Release Tag
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          push: true
          context: .
          file: Dockerfile
          tags: |
            ${{ vars.DOCKER_REGISTRY_TARGET }}:${{ env.RELEASE_VERSION }}
            ${{ vars.DOCKER_REGISTRY_TARGET }}:latest
