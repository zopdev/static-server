name: static-server

on:
  pull_request:
    branches: [ main,development ]
  push:
    tags:
      - 'v*'

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    name: Test and Build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.26'
          cache: true
      - name: Test
        run: go test ./...

  code_quality:
    name: Code Quality🎖️
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.26'
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.10.1
          args: --timeout 9m0s

  release_package:
    if: ${{ startsWith(github.ref, 'refs/tags/v')}}
    needs: [test_and_build,code_quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check Docker configuration
        id: docker-config
        run: |
          if [ -z "${{ vars.DOCKER_USERNAME }}" ]; then
            echo "::warning::DOCKER_USERNAME variable is not set - skipping Docker push"
            exit 0
          fi
          if [ -z "${{ vars.DOCKER_REGISTRY_TARGET }}" ]; then
            echo "::warning::DOCKER_REGISTRY_TARGET variable is not set - skipping Docker push"
            exit 0
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "::warning::DOCKER_PASSWORD secret is not set - skipping Docker push"
            exit 0
          fi
          echo "configured=true" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.docker-config.outputs.configured == 'true'

      - uses: docker/setup-buildx-action@v3
        if: steps.docker-config.outputs.configured == 'true'

      - uses: docker/login-action@v3
        if: steps.docker-config.outputs.configured == 'true'
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Release Tag
        if: steps.docker-config.outputs.configured == 'true'
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - uses: docker/build-push-action@v4
        if: steps.docker-config.outputs.configured == 'true'
        with:
          push: true
          context: .
          file: Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ vars.DOCKER_REGISTRY_TARGET }}:${{ env.RELEASE_VERSION }}
            ${{ vars.DOCKER_REGISTRY_TARGET }}:latest
